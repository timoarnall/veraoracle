<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vera Oracle — Render 25 Variants</title>
<style>
  body { background: #000; color: #fff; font-family: system-ui; padding: 40px; }
  canvas { display: none; }
  .renders { display: flex; flex-wrap: wrap; gap: 16px; margin-top: 20px; }
  .renders img { height: 280px; border-radius: 8px; cursor: pointer; }
  .renders img:hover { opacity: 0.8; }
  p { color: #888; margin: 8px 0; }
  h1 { font-weight: 400; }
</style>
</head>
<body>
<h1>Aura Postcards — 25 Variants</h1>
<p>Rendering...</p>
<div class="renders" id="renders"></div>
<canvas id="c"></canvas>

<script>
const W = 3000, H = 4200; // 127x177.8mm at 600 DPI
const canvas = document.getElementById('c');
canvas.width = W;
canvas.height = H;
const gl = canvas.getContext('webgl', { alpha: false, antialias: false, preserveDrawingBuffer: true });

const vsSource = `
  attribute vec2 a_pos;
  void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }
`;

const fsSource = `
  precision highp float;
  uniform vec2 u_resolution;
  uniform float u_time;
  uniform float u_scroll;
  uniform float u_energy;
  uniform vec3 u_c1;
  uniform vec3 u_c2;
  uniform vec3 u_c3;
  uniform vec3 u_sparkle;

  vec3 mod289(vec3 x) { return x - floor(x * (1.0/289.0)) * 289.0; }
  vec4 mod289(vec4 x) { return x - floor(x * (1.0/289.0)) * 289.0; }
  vec4 permute(vec4 x) { return mod289(((x*34.0)+1.0)*x); }
  vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }

  float snoise(vec3 v) {
    const vec2 C = vec2(1.0/6.0, 1.0/3.0);
    const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
    vec3 i = floor(v + dot(v, C.yyy));
    vec3 x0 = v - i + dot(i, C.xxx);
    vec3 g = step(x0.yzx, x0.xyz);
    vec3 l = 1.0 - g;
    vec3 i1 = min(g.xyz, l.zxy);
    vec3 i2 = max(g.xyz, l.zxy);
    vec3 x1 = x0 - i1 + C.xxx;
    vec3 x2 = x0 - i2 + C.yyy;
    vec3 x3 = x0 - D.yyy;
    i = mod289(i);
    vec4 p = permute(permute(permute(
              i.z + vec4(0.0, i1.z, i2.z, 1.0))
            + i.y + vec4(0.0, i1.y, i2.y, 1.0))
            + i.x + vec4(0.0, i1.x, i2.x, 1.0));
    float n_ = 0.142857142857;
    vec3 ns = n_ * D.wyz - D.xzx;
    vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
    vec4 x_ = floor(j * ns.z);
    vec4 y_ = floor(j - 7.0 * x_);
    vec4 x = x_ * ns.x + ns.yyyy;
    vec4 y = y_ * ns.x + ns.yyyy;
    vec4 h = 1.0 - abs(x) - abs(y);
    vec4 b0 = vec4(x.xy, y.xy);
    vec4 b1 = vec4(x.zw, y.zw);
    vec4 s0 = floor(b0)*2.0 + 1.0;
    vec4 s1 = floor(b1)*2.0 + 1.0;
    vec4 sh = -step(h, vec4(0.0));
    vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy;
    vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww;
    vec3 p0 = vec3(a0.xy, h.x);
    vec3 p1 = vec3(a0.zw, h.y);
    vec3 p2 = vec3(a1.xy, h.z);
    vec3 p3 = vec3(a1.zw, h.w);
    vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3)));
    p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
    vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
    m = m * m;
    return 42.0 * dot(m*m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
  }

  float fbm(vec3 p) {
    float f = 0.0;
    float amp = 0.5;
    for (int i = 0; i < 5; i++) {
      f += amp * snoise(p);
      p *= 2.1;
      amp *= 0.5;
    }
    return f;
  }

  vec3 auraColor(float t, float energy) {
    float phase = t * 3.0;
    vec3 col;
    if (phase < 1.0) col = mix(u_c1, u_c2, phase);
    else if (phase < 2.0) col = mix(u_c2, u_c3, phase - 1.0);
    else col = mix(u_c3, u_c1, phase - 2.0);
    col += vec3(0.15, 0.08, 0.02) * energy * energy;
    return col;
  }

  float hash(vec2 p) {
    vec3 p3 = fract(vec3(p.xyx) * 0.1031);
    p3 += dot(p3, p3.yzx + 33.33);
    return fract((p3.x + p3.y) * p3.z);
  }

  void main() {
    vec2 p = (gl_FragCoord.xy - 0.5 * u_resolution) / min(u_resolution.x, u_resolution.y);
    float t = u_time * 0.08;
    float scrollPhase = u_scroll * 0.002;
    float energy = u_energy;

    vec3 color = vec3(0.0);

    // Layer 1 — deep background nebula
    {
      vec3 pos = vec3(p * 1.2, t * 0.5 + scrollPhase * 0.5);
      float n = fbm(pos + vec3(0.0, 0.0, t * 0.3));
      float n2 = fbm(pos * 1.5 + vec3(t * 0.2, scrollPhase * 0.3, n));
      float aura = smoothstep(-0.1, 0.8, n * n2 + 0.3);
      aura *= 0.4;
      vec3 col = auraColor(fract(n * 0.5 + t * 0.1 + scrollPhase * 0.15), aura);
      color += col * aura;
    }

    // Layer 2 — mid volumetric light
    {
      vec2 center = vec2(sin(t * 0.3) * 0.15, cos(t * 0.25) * 0.1);
      vec3 pos = vec3((p - center * 0.3) * 1.8, t * 0.7 + 10.0 + scrollPhase);
      float n = fbm(pos + vec3(sin(t * 0.4) * 0.5, cos(t * 0.3) * 0.5, 0.0));
      vec3 pos2 = pos + vec3(n * 0.6);
      float n2 = fbm(pos2 * 0.8 + vec3(0.0, t * 0.2, 0.0));
      float dist = length(p - center);
      float aura = exp(-dist * 1.5) * smoothstep(-0.2, 0.6, n2) * 0.7;
      aura *= 1.0 + energy * 0.5;
      float phase = fract(n2 * 0.3 + t * 0.05 + 0.33 + scrollPhase * 0.1);
      vec3 col = auraColor(phase, aura);
      color += col * aura * 1.5;
    }

    // Layer 3 — tendrils
    {
      vec3 pos = vec3(p * 2.5, t + 20.0);
      float angle = atan(p.y, p.x);
      float radius = length(p);
      float tendrilCount = 3.0 + sin(scrollPhase * 0.5) * 1.5;
      float spiral = sin(angle * tendrilCount - t * 1.5 + fbm(vec3(angle, radius * 2.0, t * 0.5)) * 4.0);
      float n = fbm(pos + vec3(spiral * 0.3));
      float aura = exp(-radius * 2.5) * smoothstep(0.0, 0.5, spiral * 0.5 + 0.5) * n;
      aura = max(aura, 0.0) * 0.6;
      vec3 col = auraColor(fract(angle / 6.283 + t * 0.03 + 0.66 + scrollPhase * 0.08), aura * 1.5);
      color += col * aura * 1.8;
    }

    // Layer 4 — sparkles
    {
      vec3 pos = vec3(p * 4.0, t * 1.2 + 40.0);
      float n = snoise(pos);
      float n2 = snoise(pos * 3.0 + 100.0);
      float sparkle = pow(max(n * n2, 0.0), 3.0) * 2.0;
      sparkle *= exp(-length(p) * 1.0);
      sparkle *= 1.0 + energy * 2.0;
      color += u_sparkle * sparkle;
    }

    // Layer 5 — halo
    {
      float radius = length(p);
      float haloSize = 0.8 + sin(scrollPhase * 0.3) * 0.3;
      float halo = exp(-radius * haloSize) * 0.15;
      float n = fbm(vec3(p * 0.7, t * 0.3 + 30.0));
      halo *= (0.7 + 0.3 * n);
      vec3 haloCol = mix(u_c1, u_c3, 0.5 + 0.5 * sin(t * 0.5 + scrollPhase * 0.2));
      color += haloCol * halo;
    }

    // Energy burst
    {
      float burstRadius = length(p);
      float burst = energy * exp(-burstRadius * 1.5) * 0.4;
      float n = snoise(vec3(p * 2.0, u_time * 0.8 + scrollPhase));
      burst *= (0.7 + 0.5 * n);
      vec3 burstCol = auraColor(fract(scrollPhase * 0.1), energy);
      color += burstCol * burst;
    }

    // Vignette + tonemap
    float vignette = 1.0 - smoothstep(0.4, 1.4, length(p));
    color *= 0.5 + 0.5 * vignette;
    color = color / (color + 0.5);
    color.r *= 1.05;
    color.b *= 1.02;
    color = pow(color, vec3(0.9));

    // Grain
    float grain = (hash(gl_FragCoord.xy + fract(u_time * 100.0)) - 0.5) * 0.02;
    color += grain;

    gl_FragColor = vec4(max(color, 0.0), 1.0);
  }
`;

function createShader(type, source) {
  const shader = gl.createShader(type);
  gl.shaderSource(shader, source);
  gl.compileShader(shader);
  if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
    console.error(gl.getShaderInfoLog(shader));
    return null;
  }
  return shader;
}

const vs = createShader(gl.VERTEX_SHADER, vsSource);
const fs = createShader(gl.FRAGMENT_SHADER, fsSource);
const program = gl.createProgram();
gl.attachShader(program, vs);
gl.attachShader(program, fs);
gl.linkProgram(program);
gl.useProgram(program);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
const aPos = gl.getAttribLocation(program, 'a_pos');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

const uRes = gl.getUniformLocation(program, 'u_resolution');
const uTime = gl.getUniformLocation(program, 'u_time');
const uScroll = gl.getUniformLocation(program, 'u_scroll');
const uEnergy = gl.getUniformLocation(program, 'u_energy');
const uC1 = gl.getUniformLocation(program, 'u_c1');
const uC2 = gl.getUniformLocation(program, 'u_c2');
const uC3 = gl.getUniformLocation(program, 'u_c3');
const uSparkle = gl.getUniformLocation(program, 'u_sparkle');

gl.viewport(0, 0, W, H);

// 25 complementary color palettes — dark, rich, mystical
const palettes = [
  // Original purple/rose/blue
  { c1: [0.25,0.05,0.45], c2: [0.55,0.08,0.40], c3: [0.15,0.25,0.50], sp: [0.7,0.5,0.9] },
  // Deep indigo / magenta / teal
  { c1: [0.12,0.05,0.40], c2: [0.50,0.05,0.35], c3: [0.05,0.25,0.40], sp: [0.6,0.4,0.9] },
  // Midnight blue / violet / gold
  { c1: [0.08,0.08,0.35], c2: [0.35,0.10,0.50], c3: [0.30,0.22,0.08], sp: [0.8,0.7,0.5] },
  // Deep teal / emerald / purple
  { c1: [0.05,0.20,0.30], c2: [0.08,0.35,0.20], c3: [0.30,0.08,0.45], sp: [0.4,0.8,0.7] },
  // Warm amber / burgundy / navy
  { c1: [0.35,0.15,0.05], c2: [0.40,0.05,0.12], c3: [0.08,0.08,0.30], sp: [0.9,0.6,0.4] },
  // Rose / blush / deep blue
  { c1: [0.45,0.08,0.20], c2: [0.50,0.15,0.25], c3: [0.10,0.10,0.45], sp: [0.9,0.5,0.6] },
  // Forest / moss / plum
  { c1: [0.08,0.22,0.10], c2: [0.15,0.30,0.08], c3: [0.35,0.10,0.35], sp: [0.5,0.8,0.5] },
  // Copper / terracotta / midnight
  { c1: [0.40,0.18,0.06], c2: [0.45,0.12,0.08], c3: [0.06,0.06,0.28], sp: [0.9,0.7,0.5] },
  // Sapphire / cyan / violet
  { c1: [0.08,0.12,0.45], c2: [0.08,0.30,0.40], c3: [0.30,0.08,0.40], sp: [0.5,0.6,0.9] },
  // Blood moon / crimson / obsidian
  { c1: [0.35,0.04,0.06], c2: [0.50,0.06,0.10], c3: [0.12,0.05,0.15], sp: [0.9,0.4,0.4] },
  // Lavender / mauve / slate
  { c1: [0.25,0.15,0.40], c2: [0.35,0.18,0.35], c3: [0.15,0.15,0.25], sp: [0.7,0.6,0.9] },
  // Ocean / deep sea / bioluminescent
  { c1: [0.04,0.15,0.35], c2: [0.06,0.28,0.30], c3: [0.03,0.10,0.20], sp: [0.3,0.7,0.9] },
  // Aubergine / wine / gold
  { c1: [0.28,0.05,0.22], c2: [0.35,0.04,0.15], c3: [0.30,0.25,0.10], sp: [0.8,0.5,0.7] },
  // Northern lights / green / purple
  { c1: [0.05,0.30,0.20], c2: [0.08,0.25,0.35], c3: [0.30,0.05,0.40], sp: [0.4,0.9,0.6] },
  // Dusk / peach / navy
  { c1: [0.40,0.20,0.15], c2: [0.45,0.25,0.18], c3: [0.08,0.06,0.30], sp: [0.9,0.7,0.6] },
  // Electric / neon purple / black
  { c1: [0.30,0.02,0.50], c2: [0.45,0.02,0.55], c3: [0.08,0.04,0.18], sp: [0.8,0.4,1.0] },
  // Sage / olive / dusty rose
  { c1: [0.12,0.20,0.12], c2: [0.18,0.22,0.08], c3: [0.35,0.15,0.20], sp: [0.6,0.7,0.5] },
  // Turquoise / coral / indigo
  { c1: [0.06,0.30,0.32], c2: [0.45,0.15,0.12], c3: [0.15,0.06,0.40], sp: [0.5,0.8,0.8] },
  // Smoke / charcoal / ember
  { c1: [0.12,0.10,0.12], c2: [0.18,0.14,0.14], c3: [0.40,0.12,0.05], sp: [0.8,0.5,0.4] },
  // Amethyst / crystal / ice
  { c1: [0.22,0.08,0.38], c2: [0.18,0.15,0.40], c3: [0.15,0.25,0.35], sp: [0.7,0.6,0.95] },
  // Sunset / magenta / deep blue
  { c1: [0.50,0.15,0.08], c2: [0.55,0.08,0.30], c3: [0.08,0.08,0.40], sp: [0.9,0.5,0.7] },
  // Jade / teal / warm brown
  { c1: [0.06,0.28,0.18], c2: [0.08,0.32,0.30], c3: [0.25,0.15,0.08], sp: [0.4,0.8,0.6] },
  // Orchid / fuschia / dark slate
  { c1: [0.35,0.10,0.35], c2: [0.50,0.06,0.30], c3: [0.10,0.10,0.18], sp: [0.8,0.5,0.8] },
  // Moonlight / silver / deep violet
  { c1: [0.18,0.18,0.25], c2: [0.22,0.22,0.30], c3: [0.25,0.06,0.45], sp: [0.7,0.7,0.85] },
  // Mars / rust / void
  { c1: [0.38,0.08,0.04], c2: [0.30,0.12,0.08], c3: [0.06,0.04,0.14], sp: [0.9,0.5,0.3] },
];

// Compositing canvas
const comp = document.createElement('canvas');
comp.width = W;
comp.height = H;
const ctx = comp.getContext('2d');

const container = document.getElementById('renders');

// Spread renders across different time points
palettes.forEach((pal, i) => {
  var t = 5 + i * 12;
  var scroll = i * 80;

  gl.uniform2f(uRes, W, H);
  gl.uniform1f(uTime, t);
  gl.uniform1f(uScroll, scroll);
  gl.uniform1f(uEnergy, 0.3);
  gl.uniform3f(uC1, pal.c1[0], pal.c1[1], pal.c1[2]);
  gl.uniform3f(uC2, pal.c2[0], pal.c2[1], pal.c2[2]);
  gl.uniform3f(uC3, pal.c3[0], pal.c3[1], pal.c3[2]);
  gl.uniform3f(uSparkle, pal.sp[0], pal.sp[1], pal.sp[2]);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

  // Composite: aura + text
  ctx.drawImage(canvas, 0, 0);

  // White text, Apple style
  ctx.save();
  ctx.fillStyle = '#ffffff';
  ctx.font = '500 260px -apple-system, "SF Pro Display", "SF Pro Text", Inter, "Helvetica Neue", sans-serif';
  ctx.textBaseline = 'top';
  ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
  ctx.shadowBlur = 50;
  ctx.shadowOffsetX = 0;
  ctx.shadowOffsetY = 6;

  var x = 300;
  var y = 280;
  var lineHeight = 310;
  ctx.fillText('You were meant', x, y);
  ctx.fillText('to find this.', x, y + lineHeight);
  ctx.restore();

  var dataUrl = comp.toDataURL('image/jpeg', 0.95);
  var img = document.createElement('img');
  img.src = dataUrl;
  img.title = 'Variant ' + (i + 1) + ' — click to download';
  img.onclick = function() {
    var a = document.createElement('a');
    a.href = dataUrl;
    a.download = 'vera-oracle-postcard-' + String(i + 1).padStart(2, '0') + '.jpg';
    a.click();
  };
  container.appendChild(img);
});

document.querySelector('p').innerHTML = '25 variants at 3000x4200 (127x177.8mm, 600 DPI). Click any to download, or <a id="downloadAll" href="#" style="color:#c9a270;text-decoration:underline;cursor:pointer;">download all</a>.';
document.getElementById('downloadAll').addEventListener('click', function(e) {
  e.preventDefault();
  var imgs = container.querySelectorAll('img');
  var delay = 0;
  imgs.forEach(function(img, i) {
    setTimeout(function() {
      var a = document.createElement('a');
      a.href = img.src;
      a.download = 'vera-oracle-postcard-' + String(i + 1).padStart(2, '0') + '.jpg';
      a.click();
    }, delay);
    delay += 300;
  });
});
</script>
</body>
</html>
